<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Car Ad</title>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
<script type="module">
 const firebaseConfig = {
  apiKey: "AIzaSyDpICFMrUy8uYXJxJHx3i9cZ_xpfh_adJQ",
  authDomain: "ryanracers-b9665.firebaseapp.com",
  projectId: "ryanracers-b9665",
  storageBucket: "ryanracers-b9665.firebasestorage.app",
  messagingSenderId: "543694465821",
  appId: "1:543694465821:web:cf0e95bfa580a8c000cff4",
  measurementId: "G-673TW6ENZ7"
};
</script>
</head>
<body>
  <div><h2>Cars for Sale</h2>
<div id="saleAds"></div>

  
  <h2 id="formTitle">Upload Your Car Ad</h2>
  <form id="carForm">
    <label>Car Title</label>
    <input type="text" id="title" required><br><br>

    <label>Price</label>
    <input type="number" id="price" required><br><br>

    <label>Description</label>
    <textarea id="description" required></textarea><br><br>

    <label>Upload Image</label>
    <input type="file" id="image" accept="image/*"><br><br>

    <button type="submit">Save Ad</button>
  </form>

  <script>
    const form = document.getElementById('carForm');
    const titleInput = document.getElementById('title');
    const priceInput = document.getElementById('price');
    const descriptionInput = document.getElementById('description');
    const imageInput = document.getElementById('image');
    const formTitle = document.getElementById('formTitle');

    let ads = JSON.parse(localStorage.getItem('carAds')) || [];

    // Check if editing
    const urlParams = new URLSearchParams(window.location.search);
    const editIndex = urlParams.get('edit');

    if (editIndex !== null) {
      const ad = ads[editIndex];
      if (ad) {
        formTitle.textContent = "Edit Your Car Ad";
        titleInput.value = ad.title;
        priceInput.value = ad.price;
        descriptionInput.value = ad.description;
        // Image preview not shown here, but you could add it
      }
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const title = titleInput.value;
      const price = priceInput.value;
      const description = descriptionInput.value;
      const imageFile = imageInput.files[0];

      if (editIndex !== null) {
        // Editing existing ad
        if (imageFile) {
          const reader = new FileReader();
          reader.onload = function(event) {
            ads[editIndex] = {
              ...ads[editIndex],
              title,
              price,
              description,
              image: event.target.result
            };
            localStorage.setItem('carAds', JSON.stringify(ads));
            window.location.href = "ads.html";
          };
          reader.readAsDataURL(imageFile);
        } else {
          // Keep old image if not changed
          ads[editIndex] = {
            ...ads[editIndex],
            title,
            price,
            description
          };
          localStorage.setItem('carAds', JSON.stringify(ads));
          window.location.href = "ads.html";
        }
      } else {
        // Creating new ad
        const reader = new FileReader();
        reader.onload = function(event) {
          const ad = {
            title,
            price,
            description,
            image: event.target.result,
            uploader: "user@gmail.com" // Replace with actual logged-in user
          };
          ads.push(ad);
          localStorage.setItem('carAds', JSON.stringify(ads));
          window.location.href = "ads.html";
        };
        reader.readAsDataURL(imageFile);
      }
    });
  </script>
</body>
</html>
