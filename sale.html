<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Car Ad</title>
</head>
<body>
  <h2>Upload Your Car Ad</h2>
  <form id="carForm">
    <label>Car Title</label>
    <input type="text" id="title" required><br><br>

    <label>Price</label>
    <input type="number" id="price" required><br><br>

    <label>Description</label>
    <textarea id="description" required></textarea><br><br>

    <label>Upload Image</label>
    <input type="file" id="image" accept="image/*" required><br><br>
<label>contact</label>
    <textarea id="number" required></textarea><br><br>
    <button type="submit">Submit Ad</button>
  </form>

  <script>
    const form = document.getElementById('carForm');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const title = document.getElementById('title').value;
      const price = document.getElementById('price').value;
      const description = document.getElementById('description').value;
      const image = document.getElementById('image').files[0];

      const reader = new FileReader();
      reader.onload = function(event) {
        const ad = {
          title: title,
          price: price,
          description: description,
          image: event.target.result
        };

        // Save ad to localStorage
        let ads = JSON.parse(localStorage.getItem('carAds')) || [];
        ads.push(ad);
        localStorage.setItem('carAds', JSON.stringify(ads));

        // Redirect to ads page
        window.location.href = "ads.html";
      };
      reader.readAsDataURL(image);
    });
  </script>
</body>
</html>
