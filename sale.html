<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post Car Ad</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: gold;
      text-shadow: 2px 2px 8px black;
    }
    #adForm {
      margin: 20px auto;
      width: 80%;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background-color: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: orange;
    }
  </style>
</head>
<body>
  <h1>Ryan Racers - Post Your Car Ad</h1>

  <div id="adForm">
    <input id="title" type="text" placeholder="Ad Title">
    <input id="model" type="text" placeholder="Car Model">
    <input id="priceUSD" type="number" placeholder="Price (USD)">
    <input id="description" type="text" placeholder="Ad Description">
    <input id="image" type="text" placeholder="Image URL">
    <button onclick="postAd()">Post Ad</button>
  </div>

  <p><a href="ads.html" style="color:lightgreen;">Go to Ads Page →</a></p>

  <script>
    let ads = JSON.parse(localStorage.getItem('carAds')) || [];
    const currentUser = "Ryan"; // Replace with login system

    function postAd() {
      const title = document.getElementById("title").value;
      const model = document.getElementById("model").value;
      const priceUSD = parseFloat(document.getElementById("priceUSD").value);
      const description = document.getElementById("description").value;
      const image = document.getElementById("image").value;

      const newAd = { title, model, price: priceUSD, description, image, user: currentUser };

      ads.push(newAd);
      localStorage.setItem("carAds", JSON.stringify(ads));
      alert("Ad posted successfully!");
    }
  </script>
</body>
</html>
