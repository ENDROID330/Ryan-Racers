<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads - Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      background-color: rgba(0,0,0,0.6);
    }

    .container {
      margin: 40px auto;
      width: 80%;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
      display: block;
      width: calc(100% - 24px);
      box-sizing: border-box;
    }

    button {
      background-color: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
      width: auto;
      display: inline-block;
    }

    button:hover {
      background-color: orange;
    }

    .nav-btn {
      background-color: #2c5364;
      color: white;
      border: 1px solid gold;
    }

    .warning-text {
      color: #ffdddd;
      font-size: 12px;
      display: block;
      margin-top: -5px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <header>
    <h2>Car Ads Management</h2>
    <button class="nav-btn" onclick="window.location.href='ads.html'">Go to Marketplace (ads.html)</button>
    <button id="logoutBtn">Logout</button>
  </header>

  <div class="container">
    <h3>Post a New Advertisement</h3>
    <input type="text" id="titleInput" placeholder="Car Title">
    <input type="number" id="priceInput" placeholder="Price">
    <input type="text" id="descInput" placeholder="Description">
    <input type="file" id="imageUpload" accept="image/*">
    <span class="warning-text">* Please use images under 500KB (Firestore string limit)</span>
    <button onclick="addAd()">Add Ad</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdyIRlXiVEib0zHBtFuhRppHgRgrrBO5E",
      authDomain: "car-market-9e934.firebaseapp.com",
      projectId: "car-market-9e934",
      storageBucket: "car-market-9e934.firebasestorage.app",
      messagingSenderId: "129847588612",
      appId: "1:129847588612:web:5de1efbfebeac268bd0251",
      measurementId: "G-K3H58WH33K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = "Guest";

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user.email || user.uid;
      } else {
        currentUser = "Guest";
      }
    });

    window.addAd = async function() {
      const title = document.getElementById("titleInput").value;
      const price = document.getElementById("priceInput").value;
      const desc = document.getElementById("descInput").value;
      const fileInput = document.getElementById("imageUpload");
      const file = fileInput.files[0];

      if (title && price && desc && file) {
        if (file.size > 512000) { 
          alert("Image is too large! Please choose an image smaller than 500KB.");
          return;
        }

        const reader = new FileReader();
        reader.onload = async function(e) {
          try {
            const newAd = {
              title: title,
              price: price,
              description: desc,
              image: e.target.result, 
              user: currentUser
            };
            
            await addDoc(collection(db, "carAds"), newAd);
            
            document.getElementById("titleInput").value = "";
            document.getElementById("priceInput").value = "";
            document.getElementById("descInput").value = "";
            document.getElementById("imageUpload").value = "";
            
            alert("Ad posted successfully! View it on the Ads page.");
          } catch (error) {
            console.error("Error writing to Firestore: ", error);
            alert("Failed to save ad.");
          }
        };
        reader.readAsDataURL(file);
      } else {
        alert("Please fill all fields and upload an image.");
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      signOut(auth).then(() => {
        alert("Logged out!");
      }).catch((error) => {
        console.error("Logout issue: ", error);
      });
    });
  </script>
</body>
</html>
