<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads - Dashboard (Public)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      background-color: rgba(0,0,0,0.6);
    }

    .container {
      margin: 40px auto;
      width: 80%;
      max-width: 600px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
      display: block;
      width: calc(100% - 24px);
      box-sizing: border-box;
    }

    button {
      background-color: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
      width: auto;
      display: inline-block;
    }

    button:hover {
      background-color: orange;
    }

    button:disabled {
      background-color: #555;
      color: #aaa;
      cursor: not-allowed;
    }

    .nav-btn {
      background-color: #2c5364;
      color: white;
      border: 1px solid gold;
    }

    .info-text {
      color: #ddffdd;
      font-size: 12px;
      display: block;
      margin-top: -5px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <header>
    <h2>Car Ads Management</h2>
    <button class="nav-btn" onclick="window.location.href='ads.html'">Go to Marketplace (ads.html)</button>
  </header>

  <div class="container">
    <h3>Post a New Advertisement</h3>
    <form id="adForm" onsubmit="event.preventDefault(); addAd();">
      <input type="text" id="titleInput" placeholder="Car Title" required>
      <input type="number" id="priceInput" placeholder="Price" required>
      <input type="text" id="descInput" placeholder="Description" required>
      <input type="file" id="imageUpload" accept="image/*" required>
      <span class="info-text">* Images are saved securely to Firebase Storage (Max 5MB)</span>
      <button type="submit" id="submitBtn">Add Ad</button>
    </form>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdyIRlXiVEib0zHBtFuhRppHgRgrrBO5E",
      authDomain: "car-market-9e934.firebaseapp.com",
      projectId: "car-market-9e934",
      storageBucket: "car-market-9e934.firebasestorage.app",
      messagingSenderId: "129847588612",
      appId: "1:129847588612:web:5de1efbfebeac268bd0251",
      measurementId: "G-K3H58WH33K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    window.addAd = async function() {
      const title = document.getElementById("titleInput").value.trim();
      const price = document.getElementById("priceInput").value.trim();
      const desc = document.getElementById("descInput").value.trim();
      const fileInput = document.getElementById("imageUpload");
      const file = fileInput.files[0];
      const submitBtn = document.getElementById("submitBtn");
      
      if (!title || !price || !desc || !file) {
        alert("Please complete all form fields.");
        return;
      }

      if (file.size > 5 * 1024 * 1024) { 
        alert("Image is too large! Please choose an image smaller than 5MB.");
        return;
      }

      try {
        // Disable button while uploading so users don't click twice
        submitBtn.disabled = true;
        submitBtn.innerText = "Uploading Ad...";

        const uniqueFileName = `${Date.now()}_${file.name}`;
        const storageRef = ref(storage, `car_images/${uniqueFileName}`);

        // 1. Upload raw image to storage bucket
        const snapshot = await uploadBytes(storageRef, file);
        
        // 2. Grab the live web URL link of that image
        const downloadURL = await getDownloadURL(snapshot.ref);

        // 3. Save everything to Firestore
        const newAd = {
          title: title,
          price: Number(price),
          description: desc,
          image: downloadURL, 
          user: "Anonymous User",
          createdAt: serverTimestamp() // Uses Firebase central time clock
        };
        
        await addDoc(collection(db, "carAds"), newAd);
        
        document.getElementById("adForm").reset();
        alert("Ad posted successfully to the marketplace!");
        
      } catch (error) {
        console.error("Upload failed: ", error);
        alert("Upload failed. Make sure your Firebase Storage and Firestore Security Rules are set to public.");
      } finally {
        // Re-enable button
        submitBtn.disabled = false;
        submitBtn.innerText = "Add Ad";
      }
    };
  </script>
</body>
</html>
