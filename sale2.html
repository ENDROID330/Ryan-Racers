<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      background-color: rgba(0,0,0,0.6);
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      color: gold;
      text-shadow: 2px 2px 8px black;
    }

    .container {
      margin: 40px auto;
      width: 80%;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background-color: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: orange;
    }

    .ad-card {
      background: rgba(255,255,255,0.1);
      margin: 20px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .ad-card img {
      max-width: 300px;
      border-radius: 6px;
      margin-top: 10px;
    }

    .ad-card small {
      display: block;
      margin-top: 8px;
      color: lightyellow;
    }
    
    .warning-text {
      color: #ffdddd;
      font-size: 12px;
      display: block;
      margin-top: -5px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <header>
    <h2>Car Ads</h2>
    <button onclick="showAllAds()">All Ads</button>
    <button onclick="showMyAds()">My Ads</button>
    <button id="logoutBtn">Logout</button>
  </header>

  <div class="container">
    <input type="text" id="titleInput" placeholder="Car Title">
    <input type="number" id="priceInput" placeholder="Price">
    <input type="text" id="descInput" placeholder="Description">
    <input type="file" id="imageUpload" accept="image/*">
    <span class="warning-text">* Please use images under 500KB (Firestore string limit)</span>
    <button onclick="addAd()">Add Ad</button>
  </div>

  <div id="adsList"></div>

  <script type="module">
    // 1. Corrected Firebase Imports (using stable v10 SDKs)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 2. Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCdyIRlXiVEib0zHBtFuhRppHgRgrrBO5E",
      authDomain: "car-market-9e934.firebaseapp.com",
      projectId: "car-market-9e934",
      storageBucket: "car-market-9e934.firebasestorage.app",
      messagingSenderId: "129847588612",
      appId: "1:129847588612:web:5de1efbfebeac268bd0251",
      measurementId: "G-K3H58WH33K"
    };

    // 3. Initialize Firebase Services
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // --- Ads Logic ---
    const adsList = document.getElementById('adsList');
    let ads = []; 
    let currentUser = "Guest";

    // Track active user status from Firebase Authentication
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user.email || user.uid;
      } else {
        currentUser = "Guest";
      }
      loadAds(); // Pull fresh data from cloud whenever auth state shifts
    });

    // Fetch database items asynchronously
    async function loadAds() {
      try {
        const querySnapshot = await getDocs(collection(db, "carAds"));
        ads = [];
        querySnapshot.forEach((doc) => {
          ads.push({ id: doc.id, ...doc.data() });
        });
        renderAds(ads);
      } catch (error) {
        console.error("Error loading ads from Firestore: ", error);
      }
    }

    function renderAds(filteredAds) {
      adsList.innerHTML = "";
      if (filteredAds.length === 0) {
        adsList.innerHTML = "<p>No advertisements found.</p>";
        return;
      }

      filteredAds.forEach((ad) => {
        const adDiv = document.createElement('div');
        adDiv.classList.add('ad-card');
        adDiv.innerHTML = `
          <h3>${ad.title}</h3>
          <p><strong>Price:</strong> $${ad.price}</p>
          <p>${ad.description}</p>
          <img src="${ad.image || ''}" alt="Car Image" onerror="this.style.display='none'">
          <small>Uploaded by: ${ad.user}</small>
        `;

        // Check if current user owns this ad
        if (ad.user === currentUser && currentUser !== "Guest") {
          const editBtn = document.createElement('button');
          editBtn.textContent = "Edit";
          editBtn.onclick = () => editAd(ad.id, ad);

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = "Delete";
          deleteBtn.onclick = () => deleteAd(ad.id);

          adDiv.appendChild(editBtn);
          adDiv.appendChild(deleteBtn);
        }

        adsList.appendChild(adDiv);
      });
    }

    // Bind local functions to window context so HTML element clicks can reach them
    window.showAllAds = function() {
      renderAds(ads);
    }

    window.showMyAds = function() {
      const myAds = ads.filter(ad => ad.user === currentUser);
      renderAds(myAds);
    }

    window.addAd = async function() {
      const title = document.getElementById("titleInput").value;
      const price = document.getElementById("priceInput").value;
      const desc = document.getElementById("descInput").value;
      const fileInput = document.getElementById("imageUpload");
      const file = fileInput.files[0];

      if (title && price && desc && file) {
        // Enforce basic client-side check for image size restriction
        if (file.size > 512000) { 
          alert("Image is too large! Please choose an image smaller than 500KB.");
          return;
        }

        const reader = new FileReader();
        reader.onload = async function(e) {
          try {
            const newAd = {
              title: title,
              price: price,
              description: desc,
              image: e.target.result, 
              user: currentUser
            };
            
            await addDoc(collection(db, "carAds"), newAd);
            
            // Clear inputs upon success
            document.getElementById("titleInput").value = "";
            document.getElementById("priceInput").value = "";
            document.getElementById("descInput").value = "";
            document.getElementById("imageUpload").value = "";
            
            loadAds(); 
          } catch (error) {
            console.error("Error writing to Firestore: ", error);
            alert("Failed to save ad. Check browser console logs for security rule or size configuration bugs.");
          }
        };
        reader.readAsDataURL(file);
      } else {
        alert("Please fill all fields and upload an image.");
      }
    }

    window.editAd = async function(id, currentData) {
      const newTitle = prompt("Edit title:", currentData.title) || currentData.title;
      const newPrice = prompt("Edit price:", currentData.price) || currentData.price;
      const newDesc = prompt("Edit description:", currentData.description) || currentData.description;

      try {
        const docRef = doc(db, "carAds", id);
        await updateDoc(docRef, {
          title: newTitle,
          price: newPrice,
          description: newDesc
        });
        loadAds();
      } catch (error) {
        console.error("Error modifying document: ", error);
      }
    }

    window.deleteAd = async function(id) {
      if (confirm("Are you sure you want to delete this ad?")) {
        try {
          await deleteDoc(doc(db, "carAds", id));
          loadAds();
        } catch (error) {
          console.error("Error eliminating document: ", error);
        }
      }
    }

    // --- Logout Action ---
    document.getElementById("logoutBtn").addEventListener("click", () => {
      signOut(auth).then(() => {
        console.log("Signed out from Firebase.");
        localStorage.removeItem("currentUser");
      }).catch((error) => {
        console.error("Logout issue: ", error);
      });
    });

    // Explicit fallback execution loop to load data immediately on script completion
    loadAds();

  </script>
</body>
</html>
