<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      background-color: rgba(0,0,0,0.6);
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      color: gold;
      text-shadow: 2px 2px 8px black;
    }

    .container {
      margin: 40px auto;
      width: 80%;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background-color: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: orange;
    }

    .ad-card {
      background: rgba(255,255,255,0.1);
      margin: 20px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .ad-card img {
      max-width: 300px;
      border-radius: 6px;
      margin-top: 10px;
    }

    .ad-card small {
      display: block;
      margin-top: 8px;
      color: lightyellow;
    }
  </style>
</head>
<body>
  <header>
    <h2>Car Ads</h2>
    <button onclick="showAllAds()">All Ads</button>
    <button onclick="showMyAds()">My Ads</button>
    <button id="logoutBtn">Logout</button>
  </header>

  <!-- Upload form -->
  <div class="container">
    <input type="text" id="titleInput" placeholder="Car Title">
    <input type="number" id="priceInput" placeholder="Price">
    <input type="text" id="descInput" placeholder="Description">
    <input type="file" id="imageUpload" accept="image/*">
    <button onclick="addAd()">Add Ad</button>
  </div>

  <div id="adsList"></div>

  <script type="module">
  // --- Firebase Setup ---
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCdyIRlXiVEib0zHBtFuhRppHgRgrrBO5E",
    authDomain: "car-market-9e934.firebaseapp.com",
    projectId: "car-market-9e934",
    storageBucket: "car-market-9e934.firebasestorage.app",
    messagingSenderId: "129847588612",
    appId: "1:129847588612:web:5de1efbfebeac268bd0251",
    measurementId: "G-K3H58WH33K"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  </script>

  <script>
    // --- Ads Logic ---
    const adsList = document.getElementById('adsList');
    let ads = JSON.parse(localStorage.getItem('carAds')) || [];
    let currentUser = localStorage.getItem("currentUser") || "Guest";

    function saveAds() {
      localStorage.setItem('carAds', JSON.stringify(ads));
    }

    function renderAds(filteredAds) {
      adsList.innerHTML = "";
      filteredAds.forEach((ad, index) => {
        const adDiv = document.createElement('div');
        adDiv.classList.add('ad-card');
        adDiv.innerHTML = `
          <h3>${ad.title}</h3>
          <p><strong>Price:</strong> $${ad.price}</p>
          <p>${ad.description}</p>
          <img src="${ad.image}" alt="Car Image">
          <small>Uploaded by: ${ad.user}</small>
        `;

        if (ad.user === currentUser) {
          const editBtn = document.createElement('button');
          editBtn.textContent = "Edit";
          editBtn.onclick = () => editAd(index);

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = "Delete";
          deleteBtn.onclick = () => deleteAd(index);

          adDiv.appendChild(editBtn);
          adDiv.appendChild(deleteBtn);
        }

        adsList.appendChild(adDiv);
      });
    }

    function showAllAds() {
      renderAds(ads);
    }

    function showMyAds() {
      const myAds = ads.filter(ad => ad.user === currentUser);
      renderAds(myAds);
    }

    function addAd() {
      const title = document.getElementById("titleInput").value;
      const price = document.getElementById("priceInput").value;
      const desc = document.getElementById("descInput").value;
      const fileInput = document.getElementById("imageUpload");
      const file = fileInput.files[0];

      if (title && price && desc && file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const newAd = {
            title: title,
            price: price,
            description: desc,
            image: e.target.result, // Base64 image string
            user: currentUser
          };
          ads.push(newAd);
          saveAds();
          showAllAds();
        };
        reader.readAsDataURL(file);
      } else {
        alert("Please fill all fields and upload an image.");
      }
    }

    function editAd(index) {
      const ad = ads[index];
      const newTitle = prompt("Edit title:", ad.title);
      const newPrice = prompt("Edit price:", ad.price);
      const newDesc = prompt("Edit description:", ad.description);

      if (newTitle) ad.title = newTitle;
      if (newPrice) ad.price = newPrice;
      if (newDesc) ad.description = newDesc;

      saveAds();
      showAllAds();
    }

    function deleteAd(index) {
      if (confirm("Are you sure you want to delete this ad?")) {
        ads.splice(index, 1);
        saveAds();
        showAllAds();
      }
    }

    // --- Firebase Auth State ---
    // (Make sure you import getAuth, onAuthStateChanged, signOut if you want this part working)
    // Example:
    // import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    // const auth = getAuth(app);

    // --- Logout ---
    document.getElementById("logoutBtn").addEventListener("click", () => {
      // signOut(auth).then(() => {
      localStorage.removeItem("currentUser");
      currentUser = "Guest";
      showAllAds();
      console.log("Signed out");
      // });
    });

    showAllAds();
  </script>
</body>
</html>
