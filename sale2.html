<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      background-color: rgba(0,0,0,0.6);
    }

    .logo {
      font-size: 40px;
      font-weight: bold;
      color: gold;
      text-shadow: 2px 2px 8px black;
    }

    .container {
      margin: 40px auto;
      width: 80%;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background-color: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: orange;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      color: lightgreen;
    }
  </style>
  <title>Car Ads</title>
</head>
<body>
  <h2>Car Ads</h2>
  <div id="adsList"></div>

  <script>
    const adsList = document.getElementById('adsList');
    const ads = JSON.parse(localStorage.getItem('carAds')) || [];

    ads.forEach(ad => {
      const adDiv = document.createElement('div');
      adDiv.innerHTML = `
        <h3>${ad.title}</h3>
        <p><strong>Price:</strong> $${ad.price}</p>
        <p>${ad.description}</p>
        <img src="${ad.image}" alt="Car Image" style="max-width:300px;">
        <hr>
      `;
      adsList.appendChild(adDiv);
    });
  </script>
</body>
</html>
