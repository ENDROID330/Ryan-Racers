<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads</title>
  <!DOCTYPE html>
<html>
<head>
  <title>Cars Heritage Ads</title>
  <!-- Load ads.js as a module -->
  <script type="module" src="ads.js"></script>

  
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    #adsList {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .ad-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      transition: transform 0.2s ease;
    }
    .ad-card:hover {
      transform: translateY(-5px);
    }
    .ad-card h3 {
      margin-top: 0;
      color: #007bff;
    }
    .ad-card p {
      margin: 5px 0;
      color: #555;
    }
    .ad-card img {
      max-width: 100%;
      border-radius: 6px;
      margin-top: 10px;
    }
    .price {
      font-size: 18px;
      font-weight: bold;
      color: #28a745;
    }
    .uploader {
      font-size: 0.9em;
      color: #666;
    }
    .actions {
      margin-top: 10px;
    }
    .actions button {
      margin-right: 10px;
      padding: 6px 12px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    .delete-btn {
      background-color: #dc3545;
      color: white;
    }
    .edit-btn {
      background-color: #ffc107;
      color: black;
    }
  </style>
</head>
<body>
  <h2>Car Ads</h2>
  
  <h1>Ryan Racers Ads</h1>

  <!-- Authentication UI -->
  <div>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signUp()">Sign Up</button>
    <button onclick="signIn()">Sign In</button>
    <button onclick="logOut()">Log Out</button>
  </div>

  <!-- Ad Posting Form (hidden until login) -->
  <div id="adForm" style="display:none;">
    <input id="title" type="text" placeholder="Ad Title">
    <input id="description" type="text" placeholder="Ad Description">
    <button onclick="postAd()">Post Ad</button>
  </div>

  <!-- Ads List -->
  <div id="ads"></div>


  
  
  
  <div id="adsList"></div>
<script src="ads.js"></script>
  <script>
    const adsList = document.getElementById('adsList');
    let ads = JSON.parse(localStorage.getItem('carAds')) || [];

    // Simulate current logged-in user Gmail
    const currentUserEmail = "user@gmail.com"; // Replace with actual login system

    function renderAds() {
      adsList.innerHTML = "";
      ads.forEach((ad, index) => {
        const adDiv = document.createElement('div');
        adDiv.classList.add('ad-card');
        adDiv.innerHTML = `
          <h3>${ad.title}</h3>
          <p class="price">$${ad.price}</p>
          <p>${ad.description}</p>
          <img src="${ad.image}" alt="Car Image">
          <p class="uploader">Uploaded by: ${ad.uploader}</p>
          <div class="actions">
            ${ad.uploader === currentUserEmail ? `
              <button class="edit-btn" onclick="editAd(${index})">Edit</button>
              <button class="delete-btn" onclick="deleteAd(${index})">Delete</button>
            ` : `<em>You cannot edit/delete this ad</em>`}
          </div>
        `;
        adsList.appendChild(adDiv);
      });
    }

    function deleteAd(index) {
      if (ads[index].uploader === currentUserEmail) {
        ads.splice(index, 1);
        localStorage.setItem('carAds', JSON.stringify(ads));
        renderAds();
      } else {
        alert("You can only delete your own ads.");
      }
    }

    function editAd(index) {
      if (ads[index].uploader === currentUserEmail) {
        const ad = ads[index];
        const newTitle = prompt("Edit Title:", ad.title);
        const newPrice = prompt("Edit Price:", ad.price);
        const newDescription = prompt("Edit Description:", ad.description);
        const newImage = prompt("Edit Image URL:", ad.image);

        if (newTitle && newPrice && newDescription && newImage) {
          ads[index] = {
            title: newTitle,
            price: newPrice,
            description: newDescription,
            image: newImage,
            uploader: ad.uploader // keep uploader unchanged
          };
          localStorage.setItem('carAds', JSON.stringify(ads));
          renderAds();
        }
      } else {
        alert("You can only edit your own ads.");
      }
    }

    // Initial render
    renderAds();
  </script>
</body>
</html>
