<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }
    #adsList {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .ad-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 15px;
      transition: transform 0.2s ease;
    }
    .ad-card:hover {
      transform: translateY(-5px);
    }
    .ad-card h3 {
      margin-top: 0;
      color: #007bff;
    }
    .ad-card p {
      margin: 5px 0;
      color: #555;
    }
    .ad-card img {
      max-width: 100%;
      border-radius: 6px;
      margin-top: 10px;
    }
    .price {
      font-size: 18px;
      font-weight: bold;
      color: #28a745;
    }
    .actions {
      margin-top: 10px;
    }
    .actions button {
      margin-right: 10px;
      padding: 6px 12px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    .delete-btn {
      background-color: #dc3545;
      color: white;
    }
    .edit-btn {
      background-color: #ffc107;
      color: black;
    }
  </style>
</head>
<body>
  <h2>Car Ads</h2>
  <div id="adsList"></div>

  <script>
    const adsList = document.getElementById('adsList');
    let ads = JSON.parse(localStorage.getItem('carAds')) || [];

    function renderAds() {
      adsList.innerHTML = "";
      ads.forEach((ad, index) => {
        const adDiv = document.createElement('div');
        adDiv.classList.add('ad-card');
        adDiv.innerHTML = `
          <h3>${ad.title}</h3>
          <p class="price">$${ad.price}</p>
          <p>${ad.description}</p>
          <img src="${ad.image}" alt="Car Image">
          <div class="actions">
            <button class="edit-btn" onclick="editAd(${index})">Edit</button>
            <button class="delete-btn" onclick="deleteAd(${index})">Delete</button>
          </div>
        `;
        adsList.appendChild(adDiv);
      });
    }

    function deleteAd(index) {
      ads.splice(index, 1);
      localStorage.setItem('carAds', JSON.stringify(ads));
      renderAds();
    }

    function editAd(index) {
      const ad = ads[index];
      const newTitle = prompt("Edit Title:", ad.title);
      const newPrice = prompt("Edit Price:", ad.price);
      const newDescription = prompt("Edit Description:", ad.description);
      const newImage = prompt("Edit Image URL:", ad.image);

      if (newTitle && newPrice && newDescription && newImage) {
        ads[index] = {
          title: newTitle,
          price: newPrice,
          description: newDescription,
          image: newImage
        };
        localStorage.setItem('carAds', JSON.stringify(ads));
        renderAds();
      }
    }

    // Initial render
    renderAds();
  </script>
</body>
</html>
