<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads - Marketplace</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f2027;
      color: white;
      margin: 0;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: rgba(0,0,0,0.4);
      border-radius: 8px;
    }

    .nav-btn {
      background-color: gold;
      color: black;
      font-weight: bold;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #203a43;
    }

    .card-content {
      padding: 15px;
      text-align: left;
    }

    .price {
      color: gold;
      font-size: 1.3rem;
      font-weight: bold;
      margin: 8px 0;
    }
  </style>
</head>
<body>

  <header>
    <h2>Car Marketplace</h2>
    <a href="dashboard.html" class="nav-btn">Go to Dashboard</a>
  </header>

  <div class="grid" id="adsGrid">Loading live listings...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdyIRlXiVEib0zHBtFuhRppHgRgrrBO5E",
      authDomain: "car-market-9e934.firebaseapp.com",
      projectId: "car-market-9e934",
      storageBucket: "car-market-9e934.firebasestorage.app",
      messagingSenderId: "129847588612",
      appId: "1:129847588612:web:5de1efbfebeac268bd0251",
      measurementId: "G-K3H58WH33K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const adsGrid = document.getElementById("adsGrid");

    // Live listening query (orders items by newest post down to oldest)
    const adsQuery = query(collection(db, "carAds"), orderBy("createdAt", "desc"));

    // Realtime update connection listener
    onSnapshot(adsQuery, (snapshot) => {
      if (snapshot.empty) {
        adsGrid.innerHTML = "<p>No cars listed yet. Go to the dashboard to add one!</p>";
        return;
      }

      adsGrid.innerHTML = ""; // Wipe loader text

      snapshot.forEach((doc) => {
        const ad = doc.data();
        
        const cardHTML = `
          <div class="card">
            <img src="${ad.image}" alt="${ad.title}">
            <div class="card-content">
              <h3>${ad.title}</h3>
              <p class="price">$${Number(ad.price).toLocaleString()}</p>
              <p>${ad.description}</p>
            </div>
          </div>
        `;
        adsGrid.innerHTML += cardHTML;
      });
    }, (error) => {
      console.error("Error loading real-time data: ", error);
      adsGrid.innerHTML = "<p style='color: red;'>Failed to retrieve data. Check Firestore database indexing configuration rules.</p>";
    });
  </script>
</body>
</html>
