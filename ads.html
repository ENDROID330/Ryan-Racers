<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 20px;
      background-color: rgba(0,0,0,0.6);
    }
    .logo {
      font-size: 40px;
      font-weight: bold;
      color: gold;
      text-shadow: 2px 2px 8px black;
    }
    button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
      background-color: gold;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: orange;
    }
    .ad-card {
      background: rgba(255,255,255,0.1);
      margin: 20px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .ad-card img {
      max-width: 300px;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h2>Car Ads</h2>
    <button onclick="showAllAds()">All Ads</button>
    <button onclick="showMyAds()">My Ads</button>
    <p><a href="sale2.html" style="color:lightgreen;">← Back to Post Page</a></p>
  </header>

  <div id="adsList"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdyIRlXiVEib0zHBtFuhRppHgRgrrBO5E",
      authDomain: "car-market-9e934.firebaseapp.com",
      projectId: "car-market-9e934",
      storageBucket: "car-market-9e934.firebasestorage.app",
      messagingSenderId: "129847588612",
      appId: "1:129847588612:web:5de1efbfebeac268bd0251",
      measurementId: "G-K3H58WH33K"
    };

    // Initialize Firebase Services
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const adsList = document.getElementById('adsList');
    let ads = [];
    const currentUser = "Ryan"; // Hardcoded mockup profile placeholder

    // Pull database data from cloud Firestore collection
    async function loadAds() {
      try {
        const querySnapshot = await getDocs(collection(db, "carAds"));
        ads = [];
        querySnapshot.forEach((doc) => {
          ads.push({ id: doc.id, ...doc.data() });
        });
        renderAds(ads);
      } catch (error) {
        console.error("Error loading ads from Firestore: ", error);
        adsList.innerHTML = `<p style="color: red;">Failed to load items. Verify Firestore permissions.</p>`;
      }
    }

    function renderAds(filteredAds) {
      adsList.innerHTML = "";
      
      if (filteredAds.length === 0) {
        adsList.innerHTML = "<p>No advertisements found.</p>";
        return;
      }

      filteredAds.forEach(ad => {
        const adDiv = document.createElement('div');
        adDiv.classList.add('ad-card');
        
        // Added fallback checks if property is model vs description
        adDiv.innerHTML = `
          <h3>${ad.title || 'Untitled Car'}</h3>
          ${ad.model ? `<p><strong>Model:</strong> ${ad.model}</p>` : ''}
          <p><strong>Price:</strong> $${ad.price || 'N/A'}</p>
          <p>${ad.description || ''}</p>
          <img src="${ad.image || ''}" alt="Car Image" onerror="this.style.display='none'">
          <p><em>Uploaded by: ${ad.user || 'Anonymous'}</em></p>
        `;
        adsList.appendChild(adDiv);
      });
    }

    // Exposed to the global window context so your HTML buttons can click them safely
    window.showAllAds = function() {
      renderAds(ads);
    }

    window.showMyAds = function() {
      const myAds = ads.filter(ad => ad.user === currentUser);
      renderAds(myAds);
    }

    // Bootstrapped trigger loop to automatically run on refresh
    loadAds();
  </script>
</body>
</html>
