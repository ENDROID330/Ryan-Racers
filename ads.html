<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 20px;
      background-color: rgba(0,0,0,0.6);
    }
    .logo {
      font-size: 40px;
      font-weight: bold;
      color: gold;
      text-shadow: 2px 2px 8px black;
    }
    .ad-card {
      background: rgba(255,255,255,0.1);
      margin: 20px;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .ad-card img {
      max-width: 300px;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h2>Car Ads</h2>
    <button onclick="showAllAds()">All Ads</button>
    <button onclick="showMyAds()">My Ads</button>
    <p><a href="sale2.html" style="color:lightgreen;">← Back to Post Page</a></p>
  </header>

  <div id="adsList"></div>

  <script>
    <script type="module">
  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
 
  const firebaseConfig = {
    apiKey: "AIzaSyCdyIRlXiVEib0zHBtFuhRppHgRgrrBO5E",
    authDomain: "car-market-9e934.firebaseapp.com",
    projectId: "car-market-9e934",
    storageBucket: "car-market-9e934.firebasestorage.app",
    messagingSenderId: "129847588612",
    appId: "1:129847588612:web:5de1efbfebeac268bd0251",
    measurementId: "G-K3H58WH33K"
  };

 
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>
   <script>
     const adsList = document.getElementById('adsList');
    const ads = JSON.parse(localStorage.getItem('carAds')) || [];
    const currentUser = "Ryan"; // Replace with login system

    function renderAds(filteredAds) {
      adsList.innerHTML = "";
      filteredAds.forEach(ad => {
        const adDiv = document.createElement('div');
        adDiv.classList.add('ad-card');
        adDiv.innerHTML = `
          <h3>${ad.title}</h3>
          <p><strong>Model:</strong> ${ad.model}</p>
          <p><strong>Price:</strong> $${ad.price}</p>
          <p>${ad.description}</p>
          <img src="${ad.image}" alt="Car Image">
          <p><em>Uploaded by: ${ad.user}</em></p>
        `;
        adsList.appendChild(adDiv);
      });
    }

    function showAllAds() {
      renderAds(ads);
    }

    function showMyAds() {
      const myAds = ads.filter(ad => ad.user === currentUser);
      renderAds(myAds);
    }

    // Default: show all ads
    showAllAds();
  </script>
</body>
</html>
