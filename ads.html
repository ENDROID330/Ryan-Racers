<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Car Ads - Marketplace</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f2027;
      color: white;
      margin: 0;
      padding: 20px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .btn {
      background-color: gold;
      color: black;
      font-weight: bold;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover; /* Keeps image proportions clean without stretching */
      background-color: #203a43;
    }
    .card-content {
      padding: 15px;
      text-align: left;
    }
    .price {
      color: gold;
      font-size: 1.2rem;
      font-weight: bold;
      margin: 5px 0;
    }
    .user-tag {
      font-size: 11px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <header>
    <h2>Car Marketplace</h2>
    <a href="sale2.html" class="btn">SELL CARS</a>
  </header>

  <div class="grid" id="adsGrid">Loading marketplace items...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdyIRlXiVEib0zHBtFuhRppHgRgrrBO5E",
      authDomain: "car-market-9e934.firebaseapp.com",
      projectId: "car-market-9e934",
      storageBucket: "car-market-9e934.firebasestorage.app",
      messagingSenderId: "129847588612",
      appId: "1:129847588612:web:5de1efbfebeac268bd0251",
      measurementId: "G-K3H58WH33K"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadAds() {
      const adsGrid = document.getElementById("adsGrid");
      
      try {
        // Query to get ads sorted by newest submission
        const adsQuery = query(collection(db, "carAds"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(adsQuery);
        
        if (querySnapshot.empty) {
          adsGrid.innerHTML = "<p>No advertisements active on the market right now.</p>";
          return;
        }

        adsGrid.innerHTML = ""; // Clear loader text

        querySnapshot.forEach((doc) => {
          const ad = doc.data();

          // Construct the card structure safely using template literals
          const cardHTML = `
            <div class="card">
              <img src="${ad.image || 'https://via.placeholder.com/300x200?text=No+Image'}" alt="${ad.title}">
              <div class="card-content">
                <h3>${ad.title}</h3>
                <p class="price">$${Number(ad.price).toLocaleString()}</p>
                <p>${ad.description}</p>
                <div class="user-tag">Posted by: ${ad.user}</div>
              </div>
            </div>
          `;
          adsGrid.innerHTML += cardHTML;
        });

      } catch (error) {
        console.error("Error fetching ads: ", error);
        adsGrid.innerHTML = "<p style='color:ff8888;'>Failed to load ads. Check Firestore console rules configuration.</p>";
      }
    }

    // Initialize display layout routine automatically on launch
    loadAds();
  </script>
</body>
</html>
